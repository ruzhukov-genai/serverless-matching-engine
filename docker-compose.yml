# Local development environment
# Usage: docker compose up -d

services:
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: sme-dragonfly
    network_mode: host
    volumes:
      - dragonfly-data:/data
      - /tmp/dragonfly:/tmp/dragonfly
    command: >
      dragonfly
      --logtostderr
      --cache_mode=true
      --default_lua_flags=allow-undeclared-keys
      --proactor_threads=1
      --maxmemory=3gb
      --hz=500
      --tcp_nodelay=true
      --bind=127.0.0.1
      --port=6379
      --unixsocket=/tmp/dragonfly/dragonfly.sock
      --unixsocketperm=777
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits:
          cpus: "1.6"
          memory: 4000M
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: sme-postgres
    network_mode: host
    environment:
      POSTGRES_DB: matching_engine
      POSTGRES_USER: sme
      POSTGRES_PASSWORD: sme_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=1GB
      -c work_mem=32MB
      -c effective_cache_size=3GB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c random_page_cost=1.1
      -c synchronous_commit=off
      -c max_wal_senders=0
      -c wal_level=minimal
      -c listen_addresses=127.0.0.1
      -c checkpoint_timeout=15min
      -c max_wal_size=2GB
    deploy:
      resources:
        limits:
          cpus: "0.8"
          memory: 2000M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U sme -d matching_engine"]
      interval: 5s
      timeout: 3s
      retries: 5

