AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless Matching Engine - Backend Stack
  RDS db.t4g.micro (PostgreSQL) + ElastiCache Valkey (cache.t4g.micro) + Lambda (gateway + worker + ws-handler) + API Gateway HTTP API + WebSocket API.
  Lambda functions use AWS::Serverless::Function with PackageType: Image.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  ProjectName:
    Type: String
    Default: serverless-matching-engine

  DBPassword:
    Type: String
    NoEcho: true
    Default: sme_prod_change_me
    Description: PostgreSQL password for the sme user.

  AllowedCorsOrigin:
    Type: String
    Default: '*'
    Description: CORS allowed origin for API Gateway. Use your CloudFront URL in production.

  OrderDispatchMode:
    Type: String
    Default: 'inline'
    AllowedValues: ['inline', 'queue', 'sqs', 'sqs-direct']
    Description: >
      Order dispatch mode. inline=matching runs in Gateway Lambda (no cross-invoke, default),
      queue=Valkey LPUSH+EventBridge drain, sqs=gateway Lambda sends to SQS,
      sqs-direct=API GW sends to SQS directly (bypasses gateway Lambda for POST /api/orders).

  ValkeyEndpoint:
    Type: String
    Default: 'sme-valkey.rmmdxf.ng.0001.use1.cache.amazonaws.com'
    Description: Valkey/ElastiCache endpoint (managed outside CF).

  # Network inputs (passed from root template via nested stack outputs)
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID from Network stack.

  PublicSubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet A from Network stack.

  PrivateSubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet A from Network stack.

  PrivateSubnetB:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet B from Network stack.

  LambdaSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Gateway Lambda security group ID from Network stack.

  WorkerLambdaSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Worker Lambda security group ID from Network stack.

  RDSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: RDS security group ID from Network stack.

  PublicSubnetB:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet B from Network stack (for RDS multi-AZ subnet group).

  ElastiCacheSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: ElastiCache security group ID from Network stack.


# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Conditions:
  IsSqsDirect: !Equals [!Ref OrderDispatchMode, 'sqs-direct']
  IsInline: !Equals [!Ref OrderDispatchMode, 'inline']

Resources:

  # =========================================================================
  # IAM - Lambda Execution Role
  # =========================================================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: ECRImageAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: '*'
        # SQS — gateway sends orders, worker receives via event source mapping
        - PolicyName: SQSOrderQueue
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt OrderQueue.Arn
        - PolicyName: ManageWebSocketConnections
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # =========================================================================
  # RDS PostgreSQL (db.t4g.micro)
  # =========================================================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${ProjectName} RDS subnet group'
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-pg'
      Engine: postgres
      EngineVersion: '16.6'
      DBInstanceClass: db.t4g.micro
      AllocatedStorage: 20
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: sme
      MasterUserPassword: !Ref DBPassword
      DBName: matching_engine
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroupId
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:05:00-sun:06:00'
      AutoMinorVersionUpgrade: true
      CopyTagsToSnapshot: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-pg'
        - Key: Project
          Value: !Ref ProjectName

  # =========================================================================
  # Secrets Manager — RDS credentials for proxy auth
  # =========================================================================
  RDSSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/rds-proxy-credentials'
      Description: RDS credentials used by RDS Proxy for connection pooling
      SecretString: !Sub '{"username":"sme","password":"${DBPassword}"}'
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # =========================================================================
  # RDS Proxy — connection pooling for Lambda → PostgreSQL
  # Eliminates connection stampede from concurrent Lambda invocations.
  # Pool config tuned for Lambda: fast borrow timeout, short idle timeout.
  # =========================================================================
  RDSProxyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-rds-proxy-role-cf'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:GetResourcePolicy
                  - secretsmanager:DescribeSecret
                  - secretsmanager:ListSecretVersionIds
                Resource: !Ref RDSSecret
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  RDSProxy:
    Type: AWS::RDS::DBProxy
    DependsOn: RDSInstance
    Properties:
      DBProxyName: !Sub '${ProjectName}-proxy'
      EngineFamily: POSTGRESQL
      RequireTLS: false
      IdleClientTimeout: 300
      DebugLogging: false
      RoleArn: !GetAtt RDSProxyRole.Arn
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !Ref RDSSecret
          IAMAuth: DISABLED
      VpcSubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      VpcSecurityGroupIds:
        - !Ref RDSSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-proxy'
        - Key: Project
          Value: !Ref ProjectName

  RDSProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref RDSProxy
      TargetGroupName: default
      DBInstanceIdentifiers:
        - !Ref RDSInstance
      ConnectionPoolConfigurationInfo:
        MaxConnectionsPercent: 100
        MaxIdleConnectionsPercent: 50
        ConnectionBorrowTimeout: 15

  # =========================================================================
  # ElastiCache Valkey (single-node, non-cluster mode)
  # Non-cluster mode required: our Lua scripts access keys in different slots (ADR-004)
  # =========================================================================
  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: ElastiCache subnet group for SME
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  # ValkeyCache removed from CF — managed manually.
  # Physical resource was deleted outside CF, causing cascade !GetAtt failures.
  # TODO: re-import into CF when doing infra cleanup.
  # ValkeyCache:
  #   Type: AWS::ElastiCache::ReplicationGroup
  #   Properties:
  #     ReplicationGroupDescription: !Sub '${ProjectName} Valkey cache'
  #     Engine: valkey
  #     EngineVersion: '8.1'
  #     CacheNodeType: cache.t4g.micro
  #     NumCacheClusters: 1
  #     AutomaticFailoverEnabled: false
  #     CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
  #     SecurityGroupIds:
  #       - !Ref ElastiCacheSecurityGroupId
  #     TransitEncryptionEnabled: false
  #     Tags:
  #       - Key: Project
  #         Value: !Ref ProjectName

  # =========================================================================
  # CloudWatch Log Groups for Lambda
  # =========================================================================
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-gateway'
      RetentionInDays: 14

  # =========================================================================
  # Lambda Function - sme-gateway via AWS Lambda Web Adapter
  # Uses AWS::Serverless::Function with PackageType: Image
  # SAM builds from infra/Dockerfile.gateway with DockerContext = .. (project root)
  # =========================================================================
  GatewayLambda:
    Type: AWS::Serverless::Function
    DependsOn: LambdaLogGroup
    Metadata:
      DockerTag: latest
      DockerContext: ../..
      Dockerfile: infra/Dockerfile.gateway
    Properties:
      FunctionName: !Sub '${ProjectName}-gateway'
      Description: sme-gateway HTTP handler via AWS Lambda Web Adapter (zero code changes)
      PackageType: Image
      Architectures:
        - x86_64
      MemorySize: 1024
      Timeout: 30
      ReservedConcurrentExecutions: 500
      Role: !GetAtt LambdaRole.Arn
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
      Environment:
        Variables:
          # Lambda Web Adapter settings
          PORT: '3001'
          AWS_LWA_PORT: '3001'
          AWS_LWA_READINESS_CHECK_PATH: '/api/pairs'
          AWS_LWA_PASS_THROUGH_PATH: '/'
          # Cache: ElastiCache Valkey
          REDIS_URL: !Sub 'redis://${ValkeyEndpoint}:6379'
          RUST_LOG: info
          # Inline mode: Gateway runs matching in-process (no Worker Lambda invoke).
          # sqs-direct doesn't need gateway dispatch (API GW sends to SQS directly),
          # but gateway still handles other routes, so we fall back to inline.
          ORDER_DISPATCH_MODE: !If [IsSqsDirect, 'inline', !Ref OrderDispatchMode]
          ORDER_QUEUE_URL: !Ref OrderQueue
          # DATABASE_URL required for inline mode (PG connection for matching + persist)
          DATABASE_URL: !Sub 'postgres://sme:${DBPassword}@${RDSProxy.Endpoint}:5432/matching_engine'
      Tags:
        Project: !Ref ProjectName

  LambdaPermissionAPIGW:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GatewayLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  # =========================================================================
  # SQS Standard Queue — order dispatch (used for sqs-direct mode)
  # In inline mode (default), Gateway processes orders in-process.
  # In sqs-direct mode, API GW routes POST /api/orders directly to SQS.
  # The WorkerLambda has been merged into GatewayLambda (inline mode).
  # =========================================================================
  OrderQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-orders'
      VisibilityTimeout: 180
      MessageRetentionPeriod: 3600
      ReceiveMessageWaitTimeSeconds: 0
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # =========================================================================
  # WebSocket API for real-time feeds (ADR-006)
  # =========================================================================
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-ws-api'
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: '$request.body.action'
      Tags:
        Project: !Ref ProjectName

  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsHandlerLambda.Arn}/invocations'

  WebSocketConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub 'integrations/${WebSocketIntegration}'

  WebSocketDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub 'integrations/${WebSocketIntegration}'

  WebSocketDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      Target: !Sub 'integrations/${WebSocketIntegration}'

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - WebSocketConnectRoute
      - WebSocketDisconnectRoute
      - WebSocketDefaultRoute
    Properties:
      ApiId: !Ref WebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: ws
      AutoDeploy: true
      DeploymentId: !Ref WebSocketDeployment

  LambdaPermissionWebSocket:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsHandlerLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  # =========================================================================
  # WebSocket Handler Lambda (sme-ws-handler, native lambda_runtime, no LWA)
  # =========================================================================
  WsHandlerLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-ws-handler'
      RetentionInDays: 14

  WsHandlerLambda:
    Type: AWS::Serverless::Function
    DependsOn: WsHandlerLambdaLogGroup
    Metadata:
      DockerTag: latest
      DockerContext: ../..
      Dockerfile: infra/Dockerfile.ws-handler
    Properties:
      FunctionName: !Sub '${ProjectName}-ws-handler'
      Description: sme-ws-handler - API GW WebSocket event handler (connect/disconnect/subscribe)
      PackageType: Image
      Architectures:
        - x86_64
      MemorySize: 256
      Timeout: 30
      Role: !GetAtt LambdaRole.Arn
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
      Environment:
        Variables:
          # Cache: ElastiCache Valkey
          REDIS_URL: !Sub 'redis://${ValkeyEndpoint}:6379'
          RUST_LOG: info
      Tags:
        Project: !Ref ProjectName

  # =========================================================================
  # API Gateway HTTP API (v2 - cheapest: $1/million requests)
  # =========================================================================
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-http-api'
      Description: SME Gateway HTTP API
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedCorsOrigin
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Requested-With
        MaxAge: 86400
      Tags:
        Project: !Ref ProjectName

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GatewayLambda.Arn
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 30000

  # =========================================================================
  # API Gateway → SQS direct integration (POST /api/orders)
  # Bypasses gateway Lambda entirely for order submission.
  # Validation moved to worker Lambda (accept-then-reject model).
  # Feature flag: set OrderDispatchMode parameter to 'sqs-direct' to enable.
  # =========================================================================
  ApiGwSqsRole:
    Type: AWS::IAM::Role
    Condition: IsSqsDirect
    Properties:
      RoleName: !Sub '${ProjectName}-apigw-sqs-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSSendMessage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt OrderQueue.Arn

  SqsDirectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Condition: IsSqsDirect
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationSubtype: SQS-SendMessage
      CredentialsArn: !GetAtt ApiGwSqsRole.Arn
      PayloadFormatVersion: '1.0'
      RequestParameters:
        QueueUrl: !Ref OrderQueue
        MessageBody: $request.body
      TimeoutInMillis: 5000

  SqsDirectRoute:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsSqsDirect
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /api/orders'
      Target: !Sub 'integrations/${SqsDirectIntegration}'

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${HttpApiIntegration}'

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 5000
        ThrottlingRateLimit: 5000
      Tags:
        Project: !Ref ProjectName

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  ApiGatewayUrl:
    Description: API Gateway HTTP API invoke URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  WebSocketUrl:
    Description: WebSocket API URL for real-time feeds
    Value: !Sub 'wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/ws'

  RDSEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address

  RDSPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt RDSInstance.Endpoint.Port

  RDSProxyEndpoint:
    Description: RDS Proxy endpoint for connection pooling
    Value: !GetAtt RDSProxy.Endpoint

  ElastiCacheEndpoint:
    Description: ElastiCache Valkey endpoint address
    Value: !Ref ValkeyEndpoint
