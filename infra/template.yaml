AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless Matching Engine - Backend Stack (SAM)
  EC2 t4g.micro (Dragonfly + PostgreSQL + sme-api worker)
  Lambda container (sme-gateway via AWS Lambda Web Adapter)
  API Gateway HTTP API (cheapest)

# ---------------------------------------------------------------------------
# Globals - SAM-managed Lambda defaults
# ---------------------------------------------------------------------------
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Architectures:
      - arm64

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  ProjectName:
    Type: String
    Default: serverless-matching-engine

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access.

  SSHCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH into EC2.
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'

  SmeApiBinaryS3Uri:
    Type: String
    Default: ''
    Description: S3 URI for sme-api ARM binary. Leave empty for manual install.

  DBPassword:
    Type: String
    NoEcho: true
    Default: sme_prod_change_me
    Description: PostgreSQL password for the sme user.

# ---------------------------------------------------------------------------
# Mappings - Amazon Linux 2023 ARM64 AMIs
# ---------------------------------------------------------------------------
Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0a9eef82780017c25
    us-east-2:
      AMI: ami-09b7b6f76e4b19aca
    us-west-2:
      AMI: ami-03f65b8614a860c29
    eu-west-1:
      AMI: ami-0a2e4b86924cbb8d5

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # VPC (public + private subnets, NO NAT Gateway for cost savings)
  # =========================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---- Public Subnets (EC2) ----
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-a'

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-b'

  # ---- Private Subnets (Lambda - no internet needed, only VPC access) ----
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-a'

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-b'

  # ---- Route Tables ----
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetART:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRT:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateSubnetART:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRT:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # =========================================================================
  # Security Groups
  # =========================================================================
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 backend - Dragonfly PostgreSQL SSH
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHCidr
          Description: SSH
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda gateway - outbound to EC2 only
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          DestinationSecurityGroupId: !Ref EC2SecurityGroup
          Description: Dragonfly
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS for CloudWatch

  EC2IngressDragonfly:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Description: Dragonfly from Lambda

  EC2IngressPostgres:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Description: PostgreSQL from Lambda

  # =========================================================================
  # IAM - EC2
  # =========================================================================
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3Download
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: 'arn:aws:s3:::*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # =========================================================================
  # EC2 Instance (t4g.micro ARM - Dragonfly + PostgreSQL + sme-api)
  # =========================================================================
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t4g.micro
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AMI]
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: 30
            DeleteOnTermination: true
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > /var/log/sme-userdata.log 2>&1
          echo "=== SME EC2 Bootstrap ==="

          dnf update -y
          dnf install -y postgresql16 postgresql16-server wget curl tar unzip

          # PostgreSQL setup
          postgresql-setup --initdb || true
          systemctl enable postgresql
          systemctl start postgresql

          sudo -u postgres psql -c "CREATE USER sme WITH PASSWORD '${DBPassword}';" || true
          sudo -u postgres psql -c "CREATE DATABASE matching_engine OWNER sme;" || true
          sudo -u postgres psql -d matching_engine -c "
            CREATE TABLE IF NOT EXISTS pairs (
              id VARCHAR(20) PRIMARY KEY, base VARCHAR(10) NOT NULL, quote VARCHAR(10) NOT NULL,
              tick_size DECIMAL NOT NULL, lot_size DECIMAL NOT NULL, min_order_size DECIMAL NOT NULL,
              max_order_size DECIMAL NOT NULL, price_precision SMALLINT NOT NULL,
              qty_precision SMALLINT NOT NULL, price_band_pct DECIMAL NOT NULL DEFAULT 0.10,
              active BOOLEAN NOT NULL DEFAULT true
            );
            CREATE TABLE IF NOT EXISTS orders (
              id UUID PRIMARY KEY, user_id VARCHAR(50) NOT NULL, pair_id VARCHAR(20) NOT NULL REFERENCES pairs(id),
              side VARCHAR(4) NOT NULL, order_type VARCHAR(10) NOT NULL, tif VARCHAR(3) NOT NULL,
              price DECIMAL, quantity DECIMAL NOT NULL, remaining DECIMAL NOT NULL,
              status VARCHAR(20) NOT NULL, stp_mode VARCHAR(20) NOT NULL DEFAULT 'None',
              version BIGINT NOT NULL DEFAULT 1, sequence BIGSERIAL,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              client_order_id VARCHAR(64)
            );
            CREATE INDEX IF NOT EXISTS idx_orders_pair_status ON orders(pair_id, status);
            CREATE INDEX IF NOT EXISTS idx_orders_user ON orders(user_id, status);
            CREATE UNIQUE INDEX IF NOT EXISTS idx_orders_idempotency ON orders(user_id, client_order_id) WHERE client_order_id IS NOT NULL;
            CREATE TABLE IF NOT EXISTS trades (
              id UUID PRIMARY KEY, pair_id VARCHAR(20) NOT NULL REFERENCES pairs(id),
              buy_order_id UUID NOT NULL REFERENCES orders(id), sell_order_id UUID NOT NULL REFERENCES orders(id),
              buyer_id VARCHAR(50) NOT NULL, seller_id VARCHAR(50) NOT NULL,
              price DECIMAL NOT NULL, quantity DECIMAL NOT NULL, sequence BIGSERIAL,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_trades_pair ON trades(pair_id, created_at DESC);
            CREATE TABLE IF NOT EXISTS balances (
              user_id VARCHAR(50) NOT NULL, asset VARCHAR(10) NOT NULL,
              available DECIMAL NOT NULL DEFAULT 0, locked DECIMAL NOT NULL DEFAULT 0,
              PRIMARY KEY (user_id, asset)
            );
            CREATE TABLE IF NOT EXISTS audit_log (
              id BIGSERIAL PRIMARY KEY, sequence BIGINT NOT NULL, pair_id VARCHAR(20),
              event_type VARCHAR(30) NOT NULL, payload JSONB NOT NULL,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_audit_pair ON audit_log(pair_id, created_at DESC);
          " || true

          sudo -u postgres psql -d matching_engine -c "
            INSERT INTO pairs VALUES ('BTC-USDT','BTC','USDT',0.01,0.00001,0.00001,100,2,5,0.10,true) ON CONFLICT DO NOTHING;
            INSERT INTO pairs VALUES ('ETH-USDT','ETH','USDT',0.01,0.0001,0.0001,1000,2,4,0.10,true) ON CONFLICT DO NOTHING;
            INSERT INTO pairs VALUES ('SOL-USDT','SOL','USDT',0.001,0.01,0.01,10000,3,2,0.10,true) ON CONFLICT DO NOTHING;
            INSERT INTO balances VALUES ('user-1','BTC',10,0) ON CONFLICT DO NOTHING;
            INSERT INTO balances VALUES ('user-1','ETH',100,0) ON CONFLICT DO NOTHING;
            INSERT INTO balances VALUES ('user-1','SOL',1000,0) ON CONFLICT DO NOTHING;
            INSERT INTO balances VALUES ('user-1','USDT',1000000,0) ON CONFLICT DO NOTHING;
            INSERT INTO balances VALUES ('user-2','BTC',10,0) ON CONFLICT DO NOTHING;
            INSERT INTO balances VALUES ('user-2','ETH',100,0) ON CONFLICT DO NOTHING;
            INSERT INTO balances VALUES ('user-2','SOL',1000,0) ON CONFLICT DO NOTHING;
            INSERT INTO balances VALUES ('user-2','USDT',1000000,0) ON CONFLICT DO NOTHING;
          " || true

          PG_HBA=$(find /var/lib/pgsql -name pg_hba.conf | head -1)
          echo "host matching_engine sme 10.0.0.0/8 md5" >> "$PG_HBA"
          systemctl reload postgresql

          # Dragonfly setup
          DRAGONFLY_VERSION="1.14.2"
          ARCH="aarch64"
          wget -q "https://github.com/dragonflydb/dragonfly/releases/download/v${!DRAGONFLY_VERSION}/dragonfly-${!ARCH}.tar.gz" \
            -O /tmp/dragonfly.tar.gz
          tar xzf /tmp/dragonfly.tar.gz -C /tmp
          mv /tmp/dragonfly-${!ARCH} /usr/local/bin/dragonfly
          chmod +x /usr/local/bin/dragonfly

          useradd -r -s /bin/false dragonfly || true
          mkdir -p /var/lib/dragonfly /etc/dragonfly
          chown dragonfly:dragonfly /var/lib/dragonfly

          cat > /etc/dragonfly/dragonfly.conf << 'DRAGONCFG'
          --bind=0.0.0.0
          --port=6379
          --maxmemory=256mb
          --default_lua_flags=allow-undeclared-keys
          --dir=/var/lib/dragonfly
          --logtostderr
          DRAGONCFG

          cat > /etc/systemd/system/dragonfly.service << 'DFUNIT'
          [Unit]
          Description=Dragonfly
          After=network.target
          [Service]
          User=dragonfly
          ExecStart=/usr/local/bin/dragonfly --flagfile=/etc/dragonfly/dragonfly.conf
          Restart=always
          RestartSec=5
          LimitNOFILE=65536
          [Install]
          WantedBy=multi-user.target
          DFUNIT

          systemctl daemon-reload
          systemctl enable dragonfly
          systemctl start dragonfly

          # sme-api worker
          if [[ -n "${SmeApiBinaryS3Uri}" ]]; then
            aws s3 cp "${SmeApiBinaryS3Uri}" /usr/local/bin/sme-api
            chmod +x /usr/local/bin/sme-api
          else
            echo '#!/bin/bash' > /usr/local/bin/sme-api
            echo 'echo "sme-api not installed"' >> /usr/local/bin/sme-api
            chmod +x /usr/local/bin/sme-api
          fi

          cat > /etc/systemd/system/sme-api.service << APIUNIT
          [Unit]
          Description=SME API Worker
          After=dragonfly.service postgresql.service
          Requires=dragonfly.service postgresql.service
          [Service]
          User=ec2-user
          Environment="DATABASE_URL=postgres://sme:${DBPassword}@localhost:5432/matching_engine"
          Environment="DRAGONFLY_URL=redis://localhost:6379"
          Environment="RUST_LOG=info"
          ExecStart=/usr/local/bin/sme-api
          Restart=always
          RestartSec=10
          [Install]
          WantedBy=multi-user.target
          APIUNIT

          systemctl daemon-reload
          systemctl enable sme-api
          systemctl start sme-api || true
          echo "=== Bootstrap complete ==="
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ec2'

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      InstanceId: !Ref EC2Instance

  # =========================================================================
  # Lambda Function (SAM-managed - auto build + push Docker image)
  # =========================================================================
  GatewayFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-gateway'
      Description: sme-gateway via AWS Lambda Web Adapter (zero code changes)
      PackageType: Image
      MemorySize: 512
      Timeout: 30
      ReservedConcurrentExecutions: 10
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
      Environment:
        Variables:
          PORT: '3001'
          AWS_LWA_PORT: '3001'
          AWS_LWA_READINESS_CHECK_PATH: '/api/pairs'
          AWS_LWA_PASS_THROUGH_PATH: '/'
          DRAGONFLY_URL: !Sub 'redis://${EC2Instance.PrivateIp}:6379'
          RUST_LOG: info
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
      Policies:
        - VPCAccessPolicy: {}
    Metadata:
      DockerTag: latest
      DockerContext: ..
      Dockerfile: infra/Dockerfile.gateway

  # =========================================================================
  # API Gateway HTTP API (cheapest - $1/million requests)
  # =========================================================================
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Requested-With
        MaxAge: 86400

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  ApiGatewayUrl:
    Description: API Gateway URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  EC2PublicIP:
    Description: EC2 Elastic IP (SSH target)
    Value: !Ref ElasticIP

  EC2PrivateIP:
    Description: EC2 private IP (Lambda connects to Dragonfly here)
    Value: !GetAtt EC2Instance.PrivateIp

  VpcId:
    Description: VPC ID
    Value: !Ref VPC
