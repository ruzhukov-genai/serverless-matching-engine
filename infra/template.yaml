AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless Matching Engine — Root SAM stack.
  Orchestrates 3 nested stacks: Network, Backend, Frontend.
  All substacks are SAM templates (have their own Transform).
  Deploy: cd infra && sam build --use-buildkit && sam deploy

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  ProjectName:
    Type: String
    Default: serverless-matching-engine
    Description: Used for resource naming and tagging.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access.

  SSHCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH into EC2.
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'

  DBPassword:
    Type: String
    NoEcho: true
    Default: sme_prod_change_me
    Description: PostgreSQL password for the sme user.

  AllowedCorsOrigin:
    Type: String
    Default: '*'
    Description: CORS allowed origin for API Gateway.

  CustomDomain:
    Type: String
    Default: ''
    Description: Optional CloudFront custom domain.

  AcmCertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN for custom domain (us-east-1).

  WsHandlerImageUri:
    Type: String
    Default: '210352747749.dkr.ecr.us-east-1.amazonaws.com/serverless-matching-engine/sme-ws-handler:latest'
    Description: WebSocket Handler Lambda ECR image URI.

  CacheMode:
    Type: String
    Default: 'elasticache'
    AllowedValues: ['ec2', 'elasticache']
    Description: 'Cache backend: ec2 (Dragonfly on EC2) or elasticache (for quick rollback set to ec2)'

# ---------------------------------------------------------------------------
# Resources — Nested CloudFormation stacks (each is a SAM template)
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # 1. Network — VPC, subnets, route tables, IGW, security groups
  # =========================================================================
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: stacks/network.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        SSHCidr: !Ref SSHCidr
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # =========================================================================
  # 2. Backend — EC2, Lambda (gateway + worker), API Gateway
  # =========================================================================
  BackendStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: NetworkStack
    Properties:
      TemplateURL: stacks/backend.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        KeyPairName: !Ref KeyPairName
        DBPassword: !Ref DBPassword
        AllowedCorsOrigin: !Ref AllowedCorsOrigin
        VpcId: !GetAtt NetworkStack.Outputs.VpcId
        PublicSubnetA: !GetAtt NetworkStack.Outputs.PublicSubnetA
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        PrivateSubnetB: !GetAtt NetworkStack.Outputs.PrivateSubnetB
        EC2SecurityGroupId: !GetAtt NetworkStack.Outputs.EC2SecurityGroupId
        LambdaSecurityGroupId: !GetAtt NetworkStack.Outputs.LambdaSecurityGroupId
        WorkerLambdaSecurityGroupId: !GetAtt NetworkStack.Outputs.WorkerLambdaSecurityGroupId
        RDSSecurityGroupId: !GetAtt NetworkStack.Outputs.RDSSecurityGroupId
        ElastiCacheSecurityGroupId: !GetAtt NetworkStack.Outputs.ElastiCacheSecurityGroupId
        PublicSubnetB: !GetAtt NetworkStack.Outputs.PublicSubnetB
        WsHandlerImageUri: !Ref WsHandlerImageUri
        CacheMode: !Ref CacheMode
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # =========================================================================
  # 3. Frontend — S3 bucket, CloudFront distribution, OAC
  # =========================================================================
  FrontendStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: BackendStack
    Properties:
      TemplateURL: stacks/frontend.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        ApiGatewayUrl: !GetAtt BackendStack.Outputs.ApiGatewayUrl
        CustomDomain: !Ref CustomDomain
        AcmCertificateArn: !Ref AcmCertificateArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  ApiGatewayUrl:
    Description: API Gateway HTTP API invoke URL
    Value: !GetAtt BackendStack.Outputs.ApiGatewayUrl

  CloudFrontUrl:
    Description: CloudFront distribution URL (frontend)
    Value: !GetAtt FrontendStack.Outputs.CloudFrontUrl

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !GetAtt FrontendStack.Outputs.CloudFrontDistributionId

  FrontendBucketName:
    Description: S3 bucket name for frontend files
    Value: !GetAtt FrontendStack.Outputs.FrontendBucketName

  EC2PrivateIP:
    Description: EC2 private IP (used by Lambda for Dragonfly)
    Value: !GetAtt BackendStack.Outputs.EC2PrivateIP

  RDSEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt BackendStack.Outputs.RDSEndpoint

  VpcId:
    Description: VPC ID
    Value: !GetAtt NetworkStack.Outputs.VpcId

  WebSocketUrl:
    Description: WebSocket API URL for real-time feeds
    Value: !GetAtt BackendStack.Outputs.WebSocketUrl

  ElastiCacheEndpoint:
    Description: ElastiCache Redis endpoint address
    Value: !GetAtt BackendStack.Outputs.ElastiCacheEndpoint
