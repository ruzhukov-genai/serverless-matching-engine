<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SME — Trading</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top bar: logo + pairs + nav -->
    <header>
        <div class="header-left">
            <span class="logo">⚙ SME</span>
            <span id="conn-status" class="conn-dot" title="Connection status"></span>
            <div id="pairs-list" class="pairs-bar"></div>
        </div>
        <nav>
            <a href="/trading/" class="active">Trading</a>
            <a href="/dashboard/">Dashboard</a>
        </nav>
    </header>

    <!-- Single-screen grid -->
    <main>
        <!-- Col 1: Order Book -->
        <section id="orderbook">
            <div class="section-title">Order Book — <span id="current-pair">—</span></div>
            <div class="book-header">
                <span>Price</span>
                <span>Size</span>
                <span>Total</span>
            </div>
            <div id="asks" class="book-side asks"></div>
            <div id="spread">
                <span id="last-price"></span>
                <span id="spread-value">—</span>
            </div>
            <div id="bids" class="book-side bids"></div>
        </section>

        <!-- Col 2: Order Entry + Recent Trades stacked -->
        <div class="mid-col">
            <section id="order-entry">
                <div class="order-tabs">
                    <button class="tab active" data-side="buy">Buy</button>
                    <button class="tab" data-side="sell">Sell</button>
                </div>
                <form id="order-form" autocomplete="off">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Type</label>
                            <select id="order-type">
                                <option value="limit">Limit</option>
                                <option value="market">Market</option>
                            </select>
                        </div>
                        <div class="form-group" id="tif-group">
                            <label>TIF</label>
                            <select id="order-tif">
                                <option value="gtc">GTC</option>
                                <option value="ioc">IOC</option>
                                <option value="fok">FOK</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="price-group">
                        <label>Price</label>
                        <input type="number" id="order-price" step="any" min="0" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="order-quantity" step="any" min="0" placeholder="0.00">
                    </div>
                    <div class="form-total">
                        <span class="total-label">Total</span>
                        <span id="order-total">0.00</span>
                    </div>
                    <button type="submit" id="submit-order" class="btn-buy">Buy</button>
                </form>
            </section>

            <section id="trades">
                <div class="section-title">Recent Trades</div>
                <div class="trades-header">
                    <span>Price</span>
                    <span>Qty</span>
                    <span>Time</span>
                </div>
                <div id="trades-list"></div>
            </section>
        </div>

        <!-- Col 3: Portfolio + Open Orders stacked -->
        <div class="right-col">
            <section id="portfolio">
                <div class="section-title">Portfolio</div>
                <table>
                    <thead>
                        <tr>
                            <th>Asset</th>
                            <th>Available</th>
                            <th>Locked</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="portfolio-body">
                        <tr><td colspan="4" class="empty">Loading…</td></tr>
                    </tbody>
                </table>
            </section>

            <section id="open-orders">
                <div class="section-header">
                    <div class="section-title">Open Orders</div>
                    <button class="cancel-all-btn" onclick="cancelAllOrders()">Cancel All</button>
                </div>
                <div class="orders-table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Pair</th>
                                <th>Side</th>
                                <th>Price</th>
                                <th>Qty</th>
                                <th>Filled</th>
                                <th>Time</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="orders-body">
                            <tr><td colspan="7" class="empty">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="orders-pagination" class="pagination"></div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
