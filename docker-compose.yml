# Local development environment
# Usage: docker compose up -d

services:
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: sme-dragonfly
    ports:
      - "6379:6379"
    volumes:
      - dragonfly-data:/data
    command: >
      dragonfly
      --logtostderr
      --cache_mode=true
      --default_lua_flags=allow-undeclared-keys
      --proactor_threads=2
      --maxmemory=2gb
      --hz=100
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits:
          cpus: "1.4"
          memory: 2500M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: sme-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: matching_engine
      POSTGRES_USER: sme
      POSTGRES_PASSWORD: sme_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=512MB
      -c work_mem=16MB
      -c effective_cache_size=2GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
      -c synchronous_commit=off
      -c max_wal_senders=0
      -c wal_level=minimal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1000M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sme -d matching_engine"]
      interval: 5s
      timeout: 3s
      retries: 5

