AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless Matching Engine - Network Stack
  VPC, public/private subnets, route tables, IGW, NAT Gateway, security groups.
  Public subnets host the NAT Gateway (for Lambda internet egress to ECR/CloudWatch).

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  ProjectName:
    Type: String
    Default: serverless-matching-engine
    Description: Used for resource naming and tagging.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # VPC
  # =========================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc'
        - Key: Project
          Value: !Ref ProjectName

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-igw'
        - Key: Project
          Value: !Ref ProjectName

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---- Public Subnets (NAT Gateway lives here) ----------------------------
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-a'
        - Key: Project
          Value: !Ref ProjectName

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-b'
        - Key: Project
          Value: !Ref ProjectName

  # ---- Private Subnets (Lambda, RDS, ElastiCache live here) ---------------
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-a'
        - Key: Project
          Value: !Ref ProjectName

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-b'
        - Key: Project
          Value: !Ref ProjectName

  # ---- Route Tables -------------------------------------------------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-rt'
        - Key: Project
          Value: !Ref ProjectName

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # =========================================================================
  # NAT Gateway -- gives private subnets internet egress
  # Required for: Lambda ECR image pull, SSM agent, CloudWatch
  # =========================================================================
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-nat-eip'
        - Key: Project
          Value: !Ref ProjectName

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-nat'
        - Key: Project
          Value: !Ref ProjectName

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-rt'
        - Key: Project
          Value: !Ref ProjectName

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # =========================================================================
  # Security Groups
  # =========================================================================

  # ---- Lambda Security Group (Gateway) ------------------------------------
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda sme-gateway - allows outbound to ElastiCache and HTTPS
      VpcId: !Ref VPC
      # No ingress rules needed (Lambda is invoked by API Gateway, not via network)
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS for Lambda invoke API / ECR / CloudWatch
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-lambda-sg'
        - Key: Project
          Value: !Ref ProjectName

  # ---- Worker Lambda Security Group ---------------------------------------
  WorkerLambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda sme-worker - allows outbound to ElastiCache (Valkey) + RDS (PG)
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          Description: PostgreSQL on RDS
          DestinationSecurityGroupId: !Ref RDSSecurityGroup
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS for ECR / CloudWatch
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-worker-lambda-sg'
        - Key: Project
          Value: !Ref ProjectName

  # ---- RDS Security Group -------------------------------------------------
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL - allows inbound from Lambda SGs
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: PostgreSQL from Gateway Lambda
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 127.0.0.1/32
          Description: No outbound needed
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-rds-sg'
        - Key: Project
          Value: !Ref ProjectName

  # RDS ingress from Worker Lambda (added separately to avoid circular ref)
  RDSIngressWorkerLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref WorkerLambdaSecurityGroup
      Description: PostgreSQL from Worker Lambda

  # RDS SG self-referencing egress — required for RDS Proxy.
  # Proxy ENIs live in the same SG as RDS; proxy must open TCP to the DB backend.
  # Without this, proxy authenticates clients fine but hangs on backend connect.
  RDSEgressSelfPostgres:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref RDSSecurityGroup
      Description: RDS Proxy self-referencing egress to RDS backend

  # RDS Proxy needs HTTPS egress to Secrets Manager for credential retrieval
  RDSEgressSecretsManager:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: HTTPS for RDS Proxy to reach Secrets Manager

  # ---- ElastiCache Security Group -----------------------------------------
  ElastiCacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ElastiCache Valkey - allows inbound from Lambda SGs
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 127.0.0.1/32
          Description: No outbound needed
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-elasticache-sg'
        - Key: Project
          Value: !Ref ProjectName

  # ElastiCache ingress from Gateway Lambda
  ElastiCacheIngressGateway:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ElastiCacheSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Description: Valkey from Gateway Lambda

  # ElastiCache ingress from Worker Lambda
  ElastiCacheIngressWorker:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ElastiCacheSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref WorkerLambdaSecurityGroup
      Description: Valkey from Worker Lambda

  # ---- Lambda SG egress to ElastiCache (added separately to avoid circular refs) ----

  # Allow Gateway Lambda -> ElastiCache (6379)
  LambdaEgressElastiCache:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref LambdaSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      DestinationSecurityGroupId: !Ref ElastiCacheSecurityGroup
      Description: Valkey on ElastiCache from Gateway Lambda

  # Allow Worker Lambda -> ElastiCache (6379)
  WorkerLambdaEgressElastiCache:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref WorkerLambdaSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      DestinationSecurityGroupId: !Ref ElastiCacheSecurityGroup
      Description: Valkey on ElastiCache from Worker Lambda

  # =========================================================================
  # VPC Endpoints — allow Lambda (in private subnets) to call AWS services
  # =========================================================================

  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName} VPC Endpoint SG - allows HTTPS from Lambda SGs'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: HTTPS from Gateway Lambda
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref WorkerLambdaSecurityGroup
          Description: HTTPS from Worker Lambda
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpce-sg'

  LambdaVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.lambda'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  StsVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sts'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  SqsVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sqs'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  PublicSubnetA:
    Description: Public subnet A ID
    Value: !Ref PublicSubnetA

  PublicSubnetB:
    Description: Public subnet B ID
    Value: !Ref PublicSubnetB

  PrivateSubnetA:
    Description: Private subnet A ID
    Value: !Ref PrivateSubnetA

  PrivateSubnetB:
    Description: Private subnet B ID
    Value: !Ref PrivateSubnetB

  LambdaSecurityGroupId:
    Description: Gateway Lambda security group ID
    Value: !Ref LambdaSecurityGroup

  WorkerLambdaSecurityGroupId:
    Description: Worker Lambda security group ID
    Value: !Ref WorkerLambdaSecurityGroup

  RDSSecurityGroupId:
    Description: RDS security group ID
    Value: !Ref RDSSecurityGroup

  ElastiCacheSecurityGroupId:
    Description: ElastiCache security group ID
    Value: !Ref ElastiCacheSecurityGroup
