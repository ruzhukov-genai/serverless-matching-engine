AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Serverless Matching Engine - Backend Stack (SAM) EC2 t4g.micro (Dragonfly
  + PostgreSQL + sme-api worker) Lambda container (sme-gateway via AWS Lambda Web
  Adapter) API Gateway HTTP API (cheapest)

  '
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Architectures:
    - arm64
Parameters:
  ProjectName:
    Type: String
    Default: serverless-matching-engine
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access.
  SSHCidr:
    Type: String
    Default: '0.0.0.0/0'
    Description: CIDR allowed to SSH into EC2.
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
  SmeApiBinaryS3Uri:
    Type: String
    Default: ''
    Description: S3 URI for sme-api ARM binary. Leave empty for manual install.
  DBPassword:
    Type: String
    NoEcho: true
    Default: sme_prod_change_me
    Description: PostgreSQL password for the sme user.
  GatewayImageUri:
    Type: String
    Description: ECR image URI for the Gateway Lambda function.
  WorkerImageUri:
    Type: String
    Description: ECR image URI for the Worker Lambda function.
Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0a9eef82780017c25
    us-east-2:
      AMI: ami-09b7b6f76e4b19aca
    us-west-2:
      AMI: ami-03f65b8614a860c29
    eu-west-1:
      AMI: ami-0a2e4b86924cbb8d5
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${ProjectName}-vpc
  InternetGateway:
    Type: AWS::EC2::InternetGateway
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId:
        Ref: VPC
      InternetGatewayId:
        Ref: InternetGateway
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone:
        Fn::Select:
        - 0
        - Fn::GetAZs: ''
      MapPublicIpOnLaunch: true
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${ProjectName}-public-a
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone:
        Fn::Select:
        - 1
        - Fn::GetAZs: ''
      MapPublicIpOnLaunch: true
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${ProjectName}-public-b
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone:
        Fn::Select:
        - 0
        - Fn::GetAZs: ''
      MapPublicIpOnLaunch: false
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${ProjectName}-private-a
  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone:
        Fn::Select:
        - 1
        - Fn::GetAZs: ''
      MapPublicIpOnLaunch: false
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${ProjectName}-private-b
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:
        Ref: VPC
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId:
        Ref: PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId:
        Ref: InternetGateway
  PublicSubnetART:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: PublicSubnetA
      RouteTableId:
        Ref: PublicRouteTable
  PublicSubnetBRT:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: PublicSubnetB
      RouteTableId:
        Ref: PublicRouteTable
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:
        Ref: VPC
  PrivateSubnetART:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: PrivateSubnetA
      RouteTableId:
        Ref: PrivateRouteTable
  PrivateSubnetBRT:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: PrivateSubnetB
      RouteTableId:
        Ref: PrivateRouteTable
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 backend - Dragonfly PostgreSQL SSH
      VpcId:
        Ref: VPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp:
          Ref: SSHCidr
        Description: SSH
      SecurityGroupEgress:
      - IpProtocol: -1
        CidrIp: '0.0.0.0/0'
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda gateway - outbound to EC2 only
      VpcId:
        Ref: VPC
      SecurityGroupEgress:
      - IpProtocol: tcp
        FromPort: 6379
        ToPort: 6379
        DestinationSecurityGroupId:
          Ref: EC2SecurityGroup
        Description: Dragonfly
      - IpProtocol: tcp
        FromPort: 443
        ToPort: 443
        CidrIp: '0.0.0.0/0'
        Description: HTTPS for CloudWatch
  EC2IngressDragonfly:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId:
        Ref: EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId:
        Ref: LambdaSecurityGroup
      Description: Dragonfly from Lambda
  EC2IngressPostgres:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId:
        Ref: EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId:
        Ref: LambdaSecurityGroup
      Description: PostgreSQL from Lambda
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ec2.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
      - PolicyName: S3Download
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: s3:GetObject
            Resource: arn:aws:s3:::*
      - PolicyName: CloudWatchLogs
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource: arn:aws:logs:*:*:*
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
      - Ref: EC2Role
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t4g.micro
      ImageId:
        Fn::FindInMap:
        - RegionAMI
        - Ref: AWS::Region
        - AMI
      KeyName:
        Ref: KeyPairName
      IamInstanceProfile:
        Ref: EC2InstanceProfile
      SubnetId:
        Ref: PublicSubnetA
      SecurityGroupIds:
      - Ref: EC2SecurityGroup
      BlockDeviceMappings:
      - DeviceName: /dev/xvda
        Ebs:
          VolumeType: gp3
          VolumeSize: 30
          DeleteOnTermination: true
          Encrypted: true
      UserData:
        Fn::Base64:
          Fn::Sub: "#!/bin/bash\nset -euo pipefail\nexec > /var/log/sme-userdata.log\
            \ 2>&1\necho \"=== SME EC2 Bootstrap ===\"\n\ndnf update -y\ndnf install\
            \ -y postgresql16 postgresql16-server wget curl tar unzip\n\n# PostgreSQL\
            \ setup\npostgresql-setup --initdb || true\nsystemctl enable postgresql\n\
            systemctl start postgresql\n\nsudo -u postgres psql -c \"CREATE USER sme\
            \ WITH PASSWORD '${DBPassword}';\" || true\nsudo -u postgres psql -c \"\
            CREATE DATABASE matching_engine OWNER sme;\" || true\nsudo -u postgres\
            \ psql -d matching_engine -c \"\n  CREATE TABLE IF NOT EXISTS pairs (\n\
            \    id VARCHAR(20) PRIMARY KEY, base VARCHAR(10) NOT NULL, quote VARCHAR(10)\
            \ NOT NULL,\n    tick_size DECIMAL NOT NULL, lot_size DECIMAL NOT NULL,\
            \ min_order_size DECIMAL NOT NULL,\n    max_order_size DECIMAL NOT NULL,\
            \ price_precision SMALLINT NOT NULL,\n    qty_precision SMALLINT NOT NULL,\
            \ price_band_pct DECIMAL NOT NULL DEFAULT 0.10,\n    active BOOLEAN NOT\
            \ NULL DEFAULT true\n  );\n  CREATE TABLE IF NOT EXISTS orders (\n   \
            \ id UUID PRIMARY KEY, user_id VARCHAR(50) NOT NULL, pair_id VARCHAR(20)\
            \ NOT NULL REFERENCES pairs(id),\n    side VARCHAR(4) NOT NULL, order_type\
            \ VARCHAR(10) NOT NULL, tif VARCHAR(3) NOT NULL,\n    price DECIMAL, quantity\
            \ DECIMAL NOT NULL, remaining DECIMAL NOT NULL,\n    status VARCHAR(20)\
            \ NOT NULL, stp_mode VARCHAR(20) NOT NULL DEFAULT 'None',\n    version\
            \ BIGINT NOT NULL DEFAULT 1, sequence BIGSERIAL,\n    created_at TIMESTAMPTZ\
            \ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n\
            \    client_order_id VARCHAR(64)\n  );\n  CREATE INDEX IF NOT EXISTS idx_orders_pair_status\
            \ ON orders(pair_id, status);\n  CREATE INDEX IF NOT EXISTS idx_orders_user\
            \ ON orders(user_id, status);\n  CREATE UNIQUE INDEX IF NOT EXISTS idx_orders_idempotency\
            \ ON orders(user_id, client_order_id) WHERE client_order_id IS NOT NULL;\n\
            \  CREATE TABLE IF NOT EXISTS trades (\n    id UUID PRIMARY KEY, pair_id\
            \ VARCHAR(20) NOT NULL REFERENCES pairs(id),\n    buy_order_id UUID NOT\
            \ NULL REFERENCES orders(id), sell_order_id UUID NOT NULL REFERENCES orders(id),\n\
            \    buyer_id VARCHAR(50) NOT NULL, seller_id VARCHAR(50) NOT NULL,\n\
            \    price DECIMAL NOT NULL, quantity DECIMAL NOT NULL, sequence BIGSERIAL,\n\
            \    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()\n  );\n  CREATE INDEX\
            \ IF NOT EXISTS idx_trades_pair ON trades(pair_id, created_at DESC);\n\
            \  CREATE TABLE IF NOT EXISTS balances (\n    user_id VARCHAR(50) NOT\
            \ NULL, asset VARCHAR(10) NOT NULL,\n    available DECIMAL NOT NULL DEFAULT\
            \ 0, locked DECIMAL NOT NULL DEFAULT 0,\n    PRIMARY KEY (user_id, asset)\n\
            \  );\n  CREATE TABLE IF NOT EXISTS audit_log (\n    id BIGSERIAL PRIMARY\
            \ KEY, sequence BIGINT NOT NULL, pair_id VARCHAR(20),\n    event_type\
            \ VARCHAR(30) NOT NULL, payload JSONB NOT NULL,\n    created_at TIMESTAMPTZ\
            \ NOT NULL DEFAULT NOW()\n  );\n  CREATE INDEX IF NOT EXISTS idx_audit_pair\
            \ ON audit_log(pair_id, created_at DESC);\n\" || true\n\nsudo -u postgres\
            \ psql -d matching_engine -c \"\n  INSERT INTO pairs VALUES ('BTC-USDT','BTC','USDT',0.01,0.00001,0.00001,100,2,5,0.10,true)\
            \ ON CONFLICT DO NOTHING;\n  INSERT INTO pairs VALUES ('ETH-USDT','ETH','USDT',0.01,0.0001,0.0001,1000,2,4,0.10,true)\
            \ ON CONFLICT DO NOTHING;\n  INSERT INTO pairs VALUES ('SOL-USDT','SOL','USDT',0.001,0.01,0.01,10000,3,2,0.10,true)\
            \ ON CONFLICT DO NOTHING;\n  INSERT INTO balances VALUES ('user-1','BTC',10,0)\
            \ ON CONFLICT DO NOTHING;\n  INSERT INTO balances VALUES ('user-1','ETH',100,0)\
            \ ON CONFLICT DO NOTHING;\n  INSERT INTO balances VALUES ('user-1','SOL',1000,0)\
            \ ON CONFLICT DO NOTHING;\n  INSERT INTO balances VALUES ('user-1','USDT',1000000,0)\
            \ ON CONFLICT DO NOTHING;\n  INSERT INTO balances VALUES ('user-2','BTC',10,0)\
            \ ON CONFLICT DO NOTHING;\n  INSERT INTO balances VALUES ('user-2','ETH',100,0)\
            \ ON CONFLICT DO NOTHING;\n  INSERT INTO balances VALUES ('user-2','SOL',1000,0)\
            \ ON CONFLICT DO NOTHING;\n  INSERT INTO balances VALUES ('user-2','USDT',1000000,0)\
            \ ON CONFLICT DO NOTHING;\n\" || true\n\nPG_HBA=$(find /var/lib/pgsql\
            \ -name pg_hba.conf | head -1)\necho \"host matching_engine sme 10.0.0.0/8\
            \ md5\" >> \"$PG_HBA\"\nsystemctl reload postgresql\n\n# Dragonfly setup\n\
            DRAGONFLY_VERSION=\"1.14.2\"\nARCH=\"aarch64\"\nwget -q \"https://github.com/dragonflydb/dragonfly/releases/download/v${!DRAGONFLY_VERSION}/dragonfly-${!ARCH}.tar.gz\"\
            \ \\\n  -O /tmp/dragonfly.tar.gz\ntar xzf /tmp/dragonfly.tar.gz -C /tmp\n\
            mv /tmp/dragonfly-${!ARCH} /usr/local/bin/dragonfly\nchmod +x /usr/local/bin/dragonfly\n\
            \nuseradd -r -s /bin/false dragonfly || true\nmkdir -p /var/lib/dragonfly\
            \ /etc/dragonfly\nchown dragonfly:dragonfly /var/lib/dragonfly\n\ncat\
            \ > /etc/dragonfly/dragonfly.conf << 'DRAGONCFG'\n--bind=0.0.0.0\n--port=6379\n\
            --maxmemory=256mb\n--default_lua_flags=allow-undeclared-keys\n--dir=/var/lib/dragonfly\n\
            --logtostderr\nDRAGONCFG\n\ncat > /etc/systemd/system/dragonfly.service\
            \ << 'DFUNIT'\n[Unit]\nDescription=Dragonfly\nAfter=network.target\n[Service]\n\
            User=dragonfly\nExecStart=/usr/local/bin/dragonfly --flagfile=/etc/dragonfly/dragonfly.conf\n\
            Restart=always\nRestartSec=5\nLimitNOFILE=65536\n[Install]\nWantedBy=multi-user.target\n\
            DFUNIT\n\nsystemctl daemon-reload\nsystemctl enable dragonfly\nsystemctl\
            \ start dragonfly\n\n# sme-api worker\nif [[ -n \"${SmeApiBinaryS3Uri}\"\
            \ ]]; then\n  aws s3 cp \"${SmeApiBinaryS3Uri}\" /usr/local/bin/sme-api\n\
            \  chmod +x /usr/local/bin/sme-api\nelse\n  echo '#!/bin/bash' > /usr/local/bin/sme-api\n\
            \  echo 'echo \"sme-api not installed\"' >> /usr/local/bin/sme-api\n \
            \ chmod +x /usr/local/bin/sme-api\nfi\n\ncat > /etc/systemd/system/sme-api.service\
            \ << APIUNIT\n[Unit]\nDescription=SME API Worker\nAfter=dragonfly.service\
            \ postgresql.service\nRequires=dragonfly.service postgresql.service\n\
            [Service]\nUser=ec2-user\nEnvironment=\"DATABASE_URL=postgres://sme:${DBPassword}@localhost:5432/matching_engine\"\
            \nEnvironment=\"DRAGONFLY_URL=redis://localhost:6379\"\nEnvironment=\"\
            RUST_LOG=info\"\nExecStart=/usr/local/bin/sme-api\nRestart=always\nRestartSec=10\n\
            [Install]\nWantedBy=multi-user.target\nAPIUNIT\n\nsystemctl daemon-reload\n\
            systemctl enable sme-api\nsystemctl start sme-api || true\necho \"===\
            \ Bootstrap complete ===\"\n"
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${ProjectName}-ec2
  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      InstanceId:
        Ref: EC2Instance
  WorkerLambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Worker Lambda - outbound to EC2 (PG + Dragonfly)
      VpcId:
        Ref: VPC
      SecurityGroupEgress:
      - IpProtocol: tcp
        FromPort: 6379
        ToPort: 6379
        DestinationSecurityGroupId:
          Ref: EC2SecurityGroup
        Description: Dragonfly on EC2
      - IpProtocol: tcp
        FromPort: 5432
        ToPort: 5432
        DestinationSecurityGroupId:
          Ref: EC2SecurityGroup
        Description: PostgreSQL on EC2
      - IpProtocol: tcp
        FromPort: 443
        ToPort: 443
        CidrIp: '0.0.0.0/0'
        Description: HTTPS for CloudWatch
  EC2IngressDragonflyFromWorker:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId:
        Ref: EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId:
        Ref: WorkerLambdaSecurityGroup
      Description: Dragonfly from Worker Lambda
  EC2IngressPostgresFromWorker:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId:
        Ref: EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId:
        Ref: WorkerLambdaSecurityGroup
      Description: PostgreSQL from Worker Lambda
  GatewayFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ${ProjectName}-gateway
      Description: sme-gateway via AWS Lambda Web Adapter (zero code changes)
      PackageType: Image
      ImageUri:
        Ref: GatewayImageUri
      MemorySize: 512
      Timeout: 30
      VpcConfig:
        SubnetIds:
        - Ref: PrivateSubnetA
        - Ref: PrivateSubnetB
        SecurityGroupIds:
        - Ref: LambdaSecurityGroup
      Environment:
        Variables:
          PORT: '3001'
          AWS_LWA_PORT: '3001'
          AWS_LWA_READINESS_CHECK_PATH: /api/pairs
          AWS_LWA_PASS_THROUGH_PATH: /
          DRAGONFLY_URL:
            Fn::Sub: redis://${EC2Instance.PrivateIp}:6379
          ORDER_DISPATCH_MODE: lambda
          WORKER_LAMBDA_ARN:
            Fn::GetAtt:
            - WorkerFunction
            - Arn
          RUST_LOG: info
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /
            Method: ANY
      Policies:
      - VPCAccessPolicy: {}
      - LambdaInvokePolicy:
          FunctionName:
            Ref: WorkerFunction
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ${ProjectName}-worker
      Description: sme-worker-lambda - order matching via Lambda custom runtime
      PackageType: Image
      ImageUri:
        Ref: WorkerImageUri
      MemorySize: 1024
      Timeout: 30
      VpcConfig:
        SubnetIds:
        - Ref: PrivateSubnetA
        - Ref: PrivateSubnetB
        SecurityGroupIds:
        - Ref: WorkerLambdaSecurityGroup
      Environment:
        Variables:
          DATABASE_URL:
            Fn::Sub: postgres://sme:${DBPassword}@${EC2Instance.PrivateIp}:5432/matching_engine
          DRAGONFLY_URL:
            Fn::Sub: redis://${EC2Instance.PrivateIp}:6379
          RUST_LOG: info
      Policies:
      - VPCAccessPolicy: {}
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
        - '*'
        AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        AllowHeaders:
        - Content-Type
        - Authorization
        - X-Requested-With
        MaxAge: 86400
      DefaultRouteSettings:
        ThrottlingBurstLimit: 1000
        ThrottlingRateLimit: 1000
Outputs:
  ApiGatewayUrl:
    Description: API Gateway URL
    Value:
      Fn::Sub: https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
  EC2PublicIP:
    Description: EC2 Elastic IP (SSH target)
    Value:
      Ref: ElasticIP
  EC2PrivateIP:
    Description: EC2 private IP (Lambda connects to Dragonfly here)
    Value:
      Fn::GetAtt:
      - EC2Instance
      - PrivateIp
  VpcId:
    Description: VPC ID
    Value:
      Ref: VPC
