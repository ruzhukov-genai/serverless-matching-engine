AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless Matching Engine - Backend Stack
  EC2 t4g.micro (Dragonfly only) + RDS db.t4g.micro (PostgreSQL) + Lambda (gateway + worker) + API Gateway HTTP API.
  Lambda functions use AWS::Serverless::Function with PackageType: Image.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  ProjectName:
    Type: String
    Default: serverless-matching-engine

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access.

  DBPassword:
    Type: String
    NoEcho: true
    Default: sme_prod_change_me
    Description: PostgreSQL password for the sme user.

  AllowedCorsOrigin:
    Type: String
    Default: '*'
    Description: CORS allowed origin for API Gateway. Use your CloudFront URL in production.

  GatewayImageUri:
    Type: String
    Default: '210352747749.dkr.ecr.us-east-1.amazonaws.com/serverless-matching-engine/sme-gateway:latest'
    Description: Gateway Lambda ECR image URI

  WorkerImageUri:
    Type: String
    Default: '210352747749.dkr.ecr.us-east-1.amazonaws.com/serverless-matching-engine/sme-worker:latest'
    Description: Worker Lambda ECR image URI

  WsHandlerImageUri:
    Type: String
    Default: '210352747749.dkr.ecr.us-east-1.amazonaws.com/serverless-matching-engine/sme-ws-handler:latest'
    Description: WebSocket Handler Lambda ECR image URI

  # Network inputs (passed from root template via nested stack outputs)
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID from Network stack.

  PublicSubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet A from Network stack.

  PrivateSubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet A from Network stack.

  PrivateSubnetB:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet B from Network stack.

  EC2SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: EC2 security group ID from Network stack.

  LambdaSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Gateway Lambda security group ID from Network stack.

  WorkerLambdaSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Worker Lambda security group ID from Network stack.

  RDSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: RDS security group ID from Network stack.

  PublicSubnetB:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet B from Network stack (for RDS multi-AZ subnet group).

# ---------------------------------------------------------------------------
# Mappings - Amazon Linux 2023 ARM64 AMIs per region
# ---------------------------------------------------------------------------
Mappings:
  AmazonLinux2023ArmAmi:
    us-east-1:
      AMI: ami-0a9eef82780017c25   # AL2023 arm64 us-east-1
    us-east-2:
      AMI: ami-09b7b6f76e4b19aca   # AL2023 arm64 us-east-2
    us-west-1:
      AMI: ami-0b3c63d1b69e89b2c   # AL2023 arm64 us-west-1
    us-west-2:
      AMI: ami-03f65b8614a860c29   # AL2023 arm64 us-west-2
    eu-west-1:
      AMI: ami-0a2e4b86924cbb8d5   # AL2023 arm64 eu-west-1
    eu-central-1:
      AMI: ami-065deacbcaac64cf2   # AL2023 arm64 eu-central-1
    ap-southeast-1:
      AMI: ami-06c4be2792f419b7b   # AL2023 arm64 ap-southeast-1
    ap-northeast-1:
      AMI: ami-0dcce5b7b22f83e5a   # AL2023 arm64 ap-northeast-1

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # IAM - EC2 Instance Profile
  # =========================================================================
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ECRPull
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: '*'
        - PolicyName: S3BinaryDownload
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: 'arn:aws:s3:::*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${ProjectName}-ec2-profile'
      Roles:
        - !Ref EC2Role

  # =========================================================================
  # IAM - Lambda Execution Role
  # =========================================================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: ECRImageAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: '*'
        - PolicyName: InvokeWorkerLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-worker'
        - PolicyName: ManageWebSocketConnections
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # =========================================================================
  # EC2 Instance (t4g.micro ARM)
  # =========================================================================
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t4g.micro
      ImageId: !FindInMap [AmazonLinux2023ArmAmi, !Ref 'AWS::Region', AMI]
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PrivateSubnetA
      SecurityGroupIds:
        - !Ref EC2SecurityGroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: 30
            DeleteOnTermination: true
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > /var/log/sme-userdata.log 2>&1

          echo "=== SME EC2 Bootstrap ==="
          # EC2 runs Dragonfly only — PostgreSQL is on RDS
          dnf update -y
          dnf install -y --allowerasing wget curl tar unzip

          # ----- Dragonfly setup -----
          DRAGONFLY_VERSION="1.28.2"
          ARCH="aarch64"
          wget -q "https://github.com/dragonflydb/dragonfly/releases/download/v${!DRAGONFLY_VERSION}/dragonfly-${!ARCH}.tar.gz" \
            -O /tmp/dragonfly.tar.gz
          tar xzf /tmp/dragonfly.tar.gz -C /tmp
          mv /tmp/dragonfly-${!ARCH} /usr/local/bin/dragonfly
          chmod +x /usr/local/bin/dragonfly

          useradd -r -s /bin/false dragonfly || true
          mkdir -p /var/lib/dragonfly /etc/dragonfly
          chown dragonfly:dragonfly /var/lib/dragonfly

          cat > /etc/dragonfly/dragonfly.conf << 'DRAGONCFG'
          --bind=0.0.0.0
          --port=6379
          --maxmemory=256mb
          --proactor_threads=1
          --default_lua_flags=allow-undeclared-keys
          --dir=/var/lib/dragonfly
          --logtostderr
          DRAGONCFG

          cat > /etc/systemd/system/dragonfly.service << 'DFUNIT'
          [Unit]
          Description=Dragonfly In-Memory Data Store
          After=network.target
          [Service]
          User=dragonfly
          ExecStart=/usr/local/bin/dragonfly --flagfile=/etc/dragonfly/dragonfly.conf
          Restart=always
          RestartSec=5
          LimitNOFILE=65536
          [Install]
          WantedBy=multi-user.target
          DFUNIT

          systemctl daemon-reload
          systemctl enable dragonfly
          systemctl start dragonfly

          echo "=== Bootstrap complete (Dragonfly only) ==="
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ec2'
        - Key: Project
          Value: !Ref ProjectName

  # ElasticIP removed — EC2 now in private subnet (no public IP needed)
  # Access via SSM Session Manager only

  # =========================================================================
  # RDS PostgreSQL (db.t4g.micro)
  # =========================================================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${ProjectName} RDS subnet group'
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-pg'
      Engine: postgres
      EngineVersion: '16.6'
      DBInstanceClass: db.t4g.micro
      AllocatedStorage: 20
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: sme
      MasterUserPassword: !Ref DBPassword
      DBName: matching_engine
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroupId
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:05:00-sun:06:00'
      AutoMinorVersionUpgrade: true
      CopyTagsToSnapshot: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-pg'
        - Key: Project
          Value: !Ref ProjectName

  # =========================================================================
  # CloudWatch Log Groups for Lambda
  # =========================================================================
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-gateway'
      RetentionInDays: 14

  WorkerLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-worker'
      RetentionInDays: 14

  # =========================================================================
  # Lambda Function - sme-gateway via AWS Lambda Web Adapter
  # Uses AWS::Serverless::Function with PackageType: Image
  # SAM builds from infra/Dockerfile.gateway with DockerContext = .. (project root)
  # =========================================================================
  GatewayLambda:
    Type: AWS::Serverless::Function
    DependsOn: LambdaLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-gateway'
      Description: sme-gateway HTTP handler via AWS Lambda Web Adapter (zero code changes)
      PackageType: Image
      ImageUri: !Ref GatewayImageUri
      Architectures:
        - arm64
      MemorySize: 512
      Timeout: 30
      ReservedConcurrentExecutions: 10
      Role: !GetAtt LambdaRole.Arn
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
      Environment:
        Variables:
          # Lambda Web Adapter settings
          PORT: '3001'
          AWS_LWA_PORT: '3001'
          AWS_LWA_READINESS_CHECK_PATH: '/api/pairs'
          AWS_LWA_PASS_THROUGH_PATH: '/'
          # Application settings
          DRAGONFLY_URL: !Sub 'redis://${EC2Instance.PrivateIp}:6379'
          RUST_LOG: info
          # Worker Lambda dispatch
          ORDER_DISPATCH_MODE: lambda
          WORKER_LAMBDA_ARN: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-worker'
      Tags:
        Project: !Ref ProjectName

  LambdaPermissionAPIGW:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GatewayLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  # =========================================================================
  # Worker Lambda Function - sme-worker-lambda (native lambda_runtime)
  # Uses AWS::Serverless::Function with PackageType: Image
  # SAM builds from infra/Dockerfile.worker with DockerContext = .. (project root)
  # =========================================================================
  WorkerLambda:
    Type: AWS::Serverless::Function
    DependsOn: WorkerLambdaLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-worker'
      Description: sme-worker-lambda - order matching, PG persistence, cache updates
      PackageType: Image
      ImageUri: !Ref WorkerImageUri
      Architectures:
        - arm64
      # 1024MB: needs headroom for PG + Dragonfly connection pools and match logic
      MemorySize: 1024
      Timeout: 30
      # No ReservedConcurrentExecutions - scales freely with order volume
      Role: !GetAtt LambdaRole.Arn
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref WorkerLambdaSecurityGroupId
      Environment:
        Variables:
          DRAGONFLY_URL: !Sub 'redis://${EC2Instance.PrivateIp}:6379'
          DATABASE_URL: !Sub 'postgres://sme:${DBPassword}@${RDSInstance.Endpoint.Address}:5432/matching_engine'
          RUST_LOG: info
          WS_API_ENDPOINT: !Sub 'https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/ws'
      Tags:
        Project: !Ref ProjectName

  # =========================================================================
  # WebSocket API for real-time feeds (ADR-006)
  # =========================================================================
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-ws-api'
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: '$request.body.action'
      Tags:
        Project: !Ref ProjectName

  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsHandlerLambda.Arn}/invocations'

  WebSocketConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub 'integrations/${WebSocketIntegration}'

  WebSocketDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub 'integrations/${WebSocketIntegration}'

  WebSocketDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      Target: !Sub 'integrations/${WebSocketIntegration}'

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - WebSocketConnectRoute
      - WebSocketDisconnectRoute
      - WebSocketDefaultRoute
    Properties:
      ApiId: !Ref WebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: ws
      AutoDeploy: true
      DeploymentId: !Ref WebSocketDeployment

  LambdaPermissionWebSocket:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsHandlerLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  # =========================================================================
  # WebSocket Handler Lambda (sme-ws-handler, native lambda_runtime, no LWA)
  # =========================================================================
  WsHandlerLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-ws-handler'
      RetentionInDays: 14

  WsHandlerLambda:
    Type: AWS::Serverless::Function
    DependsOn: WsHandlerLambdaLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-ws-handler'
      Description: sme-ws-handler - API GW WebSocket event handler (connect/disconnect/subscribe)
      PackageType: Image
      ImageUri: !Ref WsHandlerImageUri
      Architectures:
        - arm64
      MemorySize: 256
      Timeout: 30
      Role: !GetAtt LambdaRole.Arn
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
      Environment:
        Variables:
          DRAGONFLY_URL: !Sub 'redis://${EC2Instance.PrivateIp}:6379'
          RUST_LOG: info
      Tags:
        Project: !Ref ProjectName

  # =========================================================================
  # API Gateway HTTP API (v2 - cheapest: $1/million requests)
  # =========================================================================
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-http-api'
      Description: SME Gateway HTTP API
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedCorsOrigin
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Requested-With
        MaxAge: 86400
      Tags:
        Project: !Ref ProjectName

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GatewayLambda.Arn
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 30000

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${HttpApiIntegration}'

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 5000
        ThrottlingRateLimit: 5000
      Tags:
        Project: !Ref ProjectName

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  ApiGatewayUrl:
    Description: API Gateway HTTP API invoke URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  WebSocketUrl:
    Description: WebSocket API URL for real-time feeds
    Value: !Sub 'wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/ws'

  EC2PrivateIP:
    Description: EC2 private IP (used by Lambda for Dragonfly)
    Value: !GetAtt EC2Instance.PrivateIp

  RDSEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address

  RDSPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt RDSInstance.Endpoint.Port
