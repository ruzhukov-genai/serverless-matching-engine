# Local development environment
# Usage: docker compose up -d

services:
  valkey:
    image: valkey/valkey:8.1-alpine
    container_name: sme-valkey
    network_mode: host
    volumes:
      - valkey-data:/data
    command: >
      valkey-server
      --bind 127.0.0.1
      --port 6379
      --maxmemory 3gb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --hz 500
      --save ""
      --appendonly no
      --loglevel notice
    deploy:
      resources:
        limits:
          cpus: "1.6"
          memory: 4000M
    healthcheck:
      test: ["CMD", "valkey-cli", "-h", "127.0.0.1", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: sme-postgres
    network_mode: host
    environment:
      POSTGRES_DB: matching_engine
      POSTGRES_USER: sme
      POSTGRES_PASSWORD: sme_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=1GB
      -c work_mem=32MB
      -c effective_cache_size=3GB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c random_page_cost=1.1
      -c synchronous_commit=off
      -c max_wal_senders=0
      -c wal_level=minimal
      -c listen_addresses=127.0.0.1
      -c checkpoint_timeout=15min
      -c max_wal_size=2GB
    deploy:
      resources:
        limits:
          cpus: "0.8"
          memory: 2000M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U sme -d matching_engine"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  valkey-data:
  postgres-data:
